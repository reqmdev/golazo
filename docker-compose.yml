services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ['--replSet', 'rs0', '--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: 'no'
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo:27017 --eval "
          try {
            rs.status();
          } catch (err) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
          }
        "

  golazo:
    build: .
    restart: unless-stopped
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/golazo?replicaSet=rs0
      GOLAZO_HEALTH_PORT: '8080'
      GOLAZO_LOG_FORMAT: json
      GOLAZO_MESSAGE_COMMANDS: 'false'
      GOLAZO_ENABLE_DEV_COMMANDS: 'false'
    ports:
      - '8080:8080'

volumes:
  mongo_data: